<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>并行任务自动排程器</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #6b7280;
      --line: #e5e7eb;
      --line-strong: #cbd5e1;
      --primary: #315efb;
      --primary-soft: #e8edff;
      --danger: #e5484d;
      --warning: #f59e0b;
      --ok: #10b981;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.10);
      --radius: 18px;
      --minute-width: 34px;
      --row-height: 72px;
      --time-axis-height: 44px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 10% 0%, rgba(49, 94, 251, 0.08), transparent 28%),
        radial-gradient(circle at 100% 20%, rgba(16, 185, 129, 0.08), transparent 25%),
        var(--bg);
      color: var(--text);
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(49, 94, 251, 0.18);
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }

    button:hover { transform: translateY(-1px); box-shadow: 0 14px 24px rgba(49, 94, 251, 0.22); }
    button:active { transform: translateY(0); }
    button.secondary {
      background: #eef2ff;
      color: #1e3a8a;
      box-shadow: none;
      border: 1px solid #dbe3ff;
    }
    button.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      box-shadow: none;
    }
    button.danger {
      background: #fff1f2;
      color: #be123c;
      box-shadow: none;
      border: 1px solid #ffe4e6;
      padding: 8px 10px;
    }

    button.clear-danger {
      background: #fee2e2;
      color: #b91c1c;
      box-shadow: none;
      border: 1px solid #fecaca;
    }
    button.clear-danger:hover {
      box-shadow: 0 10px 22px rgba(185, 28, 28, .12);
    }

    .app {
      width: min(1520px, calc(100vw - 32px));
      margin: 20px auto 30px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .top-row {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .card {
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(229, 231, 235, .88);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .intro {
      padding: 14px 16px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary-soft);
      color: #1d4ed8;
      border: 1px solid #dce6ff;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .intro h1 {
      margin: 0;
      font-size: clamp(18px, 2vw, 24px);
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .intro p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .task-panel {
      min-width: 0;
    }

    .panel-head {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .panel-head small {
      display: block;
      color: var(--muted);
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.4;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
    }

    .table-wrap {
      max-height: 340px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      text-align: left;
      background: #f8fafc;
      color: #475569;
      border-bottom: 1px solid var(--line);
      padding: 6px 4px;
      white-space: nowrap;
      font-size: 11px;
      font-weight: 700;
    }

    td {
      padding: 4px;
      border-bottom: 1px solid #eef2f7;
      vertical-align: middle;
    }

    input, select {
      width: 100%;
      min-width: 0;
      border: 1px solid #dbe1ea;
      border-radius: 6px;
      padding: 4px 6px;
      background: white;
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-size: 12px;
      height: 28px;
    }

    input:focus, select:focus {
      border-color: #8ca8ff;
      box-shadow: 0 0 0 3px rgba(49,94,251,.10);
    }

    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* 动态显示字段 */
    .field-continuous, .field-waiting {
      display: inline-block;
      width: 100%;
    }
    .field-continuous.hidden, .field-waiting.hidden {
      display: none;
    }

    .col-name { min-width: 60px; width: 60px; }
    .col-type { min-width: 60px; width: 60px; }
    .col-small { width: 46px; min-width: 46px; }
    .col-deps { min-width: 120px; width: 160px; }
    .col-action { width: 32px; }

    .dep-picker {
      position: relative;
      width: 100%;
    }

    .dep-summary {
      width: 100%;
      min-height: 28px;
      height: auto;
      max-height: none;
      overflow: visible;
      border: 1px solid #dbe1ea;
      border-radius: 6px;
      padding: 4px 6px;
      background: #fff;
      color: #0f172a;
      box-shadow: none;
      font-size: 11px;
      font-weight: 750;
      text-align: left;
      line-height: 1.35;
      white-space: normal;
      word-break: break-all;
      cursor: pointer;
    }

    .dep-summary:hover {
      transform: none;
      box-shadow: 0 0 0 3px rgba(49,94,251,.08);
    }

    .dep-menu {
      display: none;
      margin-top: 4px;
      max-height: 130px;
      overflow: auto;
      border: 1px solid #dbe1ea;
      border-radius: 10px;
      background: #fff;
      padding: 4px;
      box-shadow: 0 10px 28px rgba(15,23,42,.13);
    }

    .dep-picker.open .dep-menu {
      display: block;
    }

    .dep-option {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 6px;
      border-radius: 7px;
      cursor: pointer;
      color: #334155;
      font-size: 11px;
      line-height: 1.25;
    }

    .dep-option:hover {
      background: #f1f5f9;
    }

    .dep-option input {
      width: auto;
      height: auto;
      margin: 0;
      accent-color: var(--primary);
    }

    .dep-empty {
      padding: 6px;
      color: var(--muted);
      font-size: 11px;
    }

    .hint {
      padding: 8px 14px 12px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
      background: #fcfdff;
      border-top: 1px solid var(--line);
    }

    .hint strong { color: #334155; }

    .json-panel {
      display: none;
      padding: 10px 16px 16px;
      border-top: 1px solid var(--line);
    }

    .json-panel.show { display: block; }

    textarea {
      width: 100%;
      min-height: 80px;
      border: 1px solid #dbe1ea;
      border-radius: 10px;
      padding: 8px;
      color: #0f172a;
      background: #f8fafc;
      resize: vertical;
      outline: none;
      line-height: 1.4;
      font-size: 11px;
    }

    .mini-note {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.3;
      margin-top: 4px;
    }

    .bottom-row {
      width: 100%;
    }

    .timeline-panel {
      overflow: hidden;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 16px 0;
    }

    .stat {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 6px 10px;
      min-width: 80px;
    }

    .stat label {
      display: block;
      color: var(--muted);
      font-size: 10px;
      margin-bottom: 1px;
    }

    .stat b {
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .timeline-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 16px;
      border-bottom: 1px solid var(--line);
    }

    .timeline-tools .grow { flex: 1; }

    .scale-control {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .scale-control input {
      width: 90px;
      padding: 0;
      box-shadow: none;
    }

    .timeline-scroll {
      overflow: auto;
      width: 100%;
      max-height: 580px;
      background: #fff;
    }

    .timeline-inner {
      position: relative;
      min-width: 960px;
      padding-left: 132px;
      padding-bottom: 18px;
      user-select: none;
    }

    .time-axis {
      position: sticky;
      top: 0;
      z-index: 20;
      height: var(--time-axis-height);
      background: rgba(248, 250, 252, 0.96);
      border-bottom: 1px solid var(--line-strong);
      backdrop-filter: blur(10px);
    }

    .axis-label {
      position: absolute;
      left: -132px;
      top: 0;
      width: 132px;
      height: var(--time-axis-height);
      display: flex;
      align-items: center;
      padding-left: 18px;
      font-size: 12px;
      color: #64748b;
      font-weight: 800;
      border-right: 1px solid var(--line-strong);
      background: rgba(248, 250, 252, .96);
    }

    .tick {
      position: absolute;
      top: 0;
      height: var(--time-axis-height);
      border-left: 1px solid #dbe3ee;
      font-size: 10px;
      color: #64748b;
      padding-left: 4px;
      display: flex;
      align-items: center;
      font-weight: 700;
    }

    .tick.minor {
      border-left: 1px solid #eef2f7;
      color: #94a3b8;
      font-weight: 600;
    }

    .lanes {
      position: relative;
    }

    .lane {
      position: relative;
      height: var(--row-height);
      border-bottom: 1px solid #eef2f7;
    }

    .lane:nth-child(odd) {
      background: #fcfdff;
    }

    .lane-label {
      position: absolute;
      left: -132px;
      top: 0;
      width: 132px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      padding: 0 12px 0 18px;
      border-right: 1px solid var(--line-strong);
      background: inherit;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
    }

    .lane-label span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
    }

    .grid-line {
      position: absolute;
      top: 0;
      bottom: 0;
      border-left: 1px solid #eef2f7;
      pointer-events: none;
    }

    .grid-line.major {
      border-left-color: #dbe3ee;
    }

    .now-line {
      position: absolute;
      top: var(--time-axis-height);
      bottom: 18px;
      width: 2px;
      background: rgba(49, 94, 251, .55);
      z-index: 5;
      pointer-events: none;
    }

    .task-block {
      --task-color: #4f7cff;
      position: absolute;
      height: 48px;
      border-radius: 15px;
      overflow: hidden;
      border: 1.5px solid var(--task-color);
      box-shadow: 0 10px 24px rgba(15, 23, 42, .12);
      cursor: grab;
      z-index: 10;
      background: #fff;
      min-width: 28px;
      touch-action: none;
      transition: box-shadow .15s, transform .15s, filter .15s;
    }

    .task-block:hover {
      box-shadow: 0 14px 28px rgba(15, 23, 42, .18);
      transform: translateY(-1px);
    }

    .task-block.dragging {
      opacity: .88;
      filter: saturate(1.08);
      cursor: grabbing;
      z-index: 50;
      transition: none;
    }

    .task-block.invalid {
      border-color: var(--danger) !important;
      box-shadow: 0 10px 28px rgba(229, 72, 77, .25);
    }

    .task-block.locked::after {
      content: "手动";
      position: absolute;
      right: 6px;
      top: 4px;
      z-index: 4;
      background: rgba(255,255,255,.86);
      color: #475569;
      border: 1px solid rgba(148,163,184,.45);
      border-radius: 999px;
      padding: 0 6px;
      font-size: 9px;
      font-weight: 900;
    }

    .task-block.continuous {
      background: var(--task-color);
      color: white;
    }

    .task-block.waiting {
      background: #fff;
      color: #0f172a;
    }

    .wait-start,
    .wait-gradient {
      position: absolute;
      top: 0;
      bottom: 0;
      pointer-events: none;
    }

    .wait-start {
      background: var(--task-color);
      opacity: .94;
    }

    .wait-gradient {
      background: linear-gradient(90deg, rgba(var(--task-rgb), .72), rgba(var(--task-rgb), .22) 52%, rgba(255,255,255,.96) 100%);
    }

    .task-content {
      position: relative;
      z-index: 3;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4px 10px;
      min-width: 0;
      pointer-events: none;
    }

    .task-title {
      font-size: 12px;
      font-weight: 900;
      letter-spacing: -.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 0 rgba(255,255,255,.25);
    }

    .task-block.continuous .task-title,
    .task-block.continuous .task-meta {
      text-shadow: 0 1px 1px rgba(0,0,0,.18);
    }

    .task-meta {
      margin-top: 1px;
      font-size: 10px;
      font-weight: 750;
      color: rgba(15, 23, 42, .68);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-block.continuous .task-meta {
      color: rgba(255,255,255,.86);
    }

    .resize-handle {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 13px;
      z-index: 6;
      cursor: ew-resize;
      background: linear-gradient(90deg, transparent, rgba(15,23,42,.10));
      pointer-events: auto;
    }

    .resize-handle::before {
      content: "";
      position: absolute;
      top: 15px;
      right: 5px;
      width: 2px;
      height: 18px;
      border-radius: 2px;
      background: rgba(255,255,255,.72);
      box-shadow: -4px 0 0 rgba(255,255,255,.50);
      mix-blend-mode: overlay;
    }

    .start-resize-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 12px;
      z-index: 7;
      cursor: ew-resize;
      pointer-events: auto;
      transform: translateX(-6px);
    }

    .start-resize-handle::before {
      content: "";
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 5px;
      width: 2px;
      border-radius: 999px;
      background: rgba(15,23,42,.38);
      box-shadow: 0 0 0 3px rgba(255,255,255,.62);
    }

    .start-resize-handle:hover::before {
      background: rgba(49,94,251,.82);
      box-shadow: 0 0 0 4px rgba(49,94,251,.16), 0 0 0 7px rgba(255,255,255,.82);
    }

    .dependency-box {
      position: absolute;
      border: 1px dashed rgba(49,94,251,.62);
      border-radius: 18px;
      pointer-events: none;
      z-index: 7;
      background: rgba(49,94,251,.025);
    }

    .warning-box {
      margin: 8px 16px 12px;
      display: none;
      border: 1px solid #fed7aa;
      color: #9a3412;
      background: #fff7ed;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.4;
    }

    .warning-box.show { display: block; }

    .empty-state {
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, .36);
      backdrop-filter: blur(6px);
      z-index: 900;
    }

    .modal-backdrop.show { display: flex; }

    .modal-card {
      width: min(380px, 100%);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 28px 70px rgba(15,23,42,.28);
      border: 1px solid rgba(226,232,240,.96);
      padding: 18px;
    }

    .modal-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: -.02em;
    }

    .modal-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px;
    }

    button.modal-danger {
      background: #dc2626;
      border: 1px solid #dc2626;
      color: #fff;
      box-shadow: 0 10px 24px rgba(220,38,38,.22);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(12px);
      background: rgba(15, 23, 42, .94);
      color: white;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s, transform .18s;
      z-index: 999;
      box-shadow: 0 16px 36px rgba(15,23,42,.25);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 860px) {
      .top-row {
        grid-template-columns: 1fr;
      }
      .intro {
        text-align: center;
      }
      .app {
        width: calc(100vw - 16px);
        margin-top: 12px;
        gap: 12px;
      }
      .panel-head {
        flex-direction: column;
        align-items: stretch;
      }
      .toolbar {
        justify-content: flex-start;
      }
      .table-wrap {
        max-height: 280px;
      }
    }

    @media (max-width: 480px) {
      .stats { flex-direction: column; }
      .timeline-tools { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-row">
      <div class="card intro">
        <div class="eyebrow">⏱️ 智能排程</div>
        <h1>并行任务自动排程器</h1>
        <p>等待任务可释放人力，自动计算最短完工时间。</p>
      </div>

      <section class="card task-panel">
        <div class="panel-head">
          <div>
            <h2>任务列表</h2>
            <small>依赖用下拉选择（多选）。等待任务分“启动”和“等待”。</small>
          </div>
          <div class="toolbar">
            <button id="addTask" class="secondary">新增</button>
            <button id="clearAllTasks" class="clear-danger">清空全部</button>
            <button id="autoSchedule">自动排序</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="col-name">任务</th>
                <th class="col-type">类型</th>
                <th class="col-small">持续</th>
                <th class="col-small">启动</th>
                <th class="col-small">等待</th>
                <th class="col-deps">前置</th>
                <th class="col-action"></th>
              </tr>
            </thead>
            <tbody id="taskRows"></tbody>
          </table>
        </div>
        <div class="hint">
          <strong>💡 用法：</strong>输入任务，点“自动排序”。拖动方块改开始位置，右边缘改总时长；等待任务内部竖线可调整“启动”部分。有依赖的任务会用虚线框住，组内重叠时自动使用相邻行。
        </div>
        <div class="json-panel" id="jsonPanel">
          <textarea id="jsonText" spellcheck="false"></textarea>
          <div class="mini-note">可复制保存，也可粘贴修改后的 JSON 导入。</div>
        </div>
      </section>
    </div>

    <div class="bottom-row">
      <section class="card timeline-panel">
        <div class="panel-head">
          <div>
            <h2>时间轴</h2>
            <small>拖动任务块改开始时间；拖动右边缘改总时长。依赖关系用虚线框表示。</small>
          </div>
          <div class="toolbar">
            <button id="resetLocks" class="secondary">清除手动</button>
            <button id="toggleJson" class="ghost">JSON</button>
          </div>
        </div>
        <div class="stats" id="stats"></div>
        <div class="timeline-tools">
          <div class="scale-control">
            <span>缩放</span>
            <input id="scaleRange" type="range" min="2" max="72" value="34" />
            <span id="scaleText">34 px/分钟</span>
          </div>
          <div class="grow"></div>
          <button id="fitView" class="ghost">适合宽度</button>
        </div>
        <div class="warning-box" id="warningBox"></div>
        <div class="timeline-scroll" id="timelineScroll">
          <div class="timeline-inner" id="timelineInner">
            <div class="time-axis" id="timeAxis"><div class="axis-label">时间</div></div>
            <div class="now-line" id="nowLine"></div>
            <div class="lanes" id="lanes"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div class="modal-backdrop" id="confirmClearModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirmClearTitle">
      <h3 id="confirmClearTitle">确认清空全部任务？</h3>
      <p>这会删除当前任务列表、前置关系和手动拖动记录。这个操作不能撤销。</p>
      <div class="modal-actions">
        <button id="cancelClear" class="ghost" type="button">取消</button>
        <button id="confirmClear" class="modal-danger" type="button">确认清空</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const palette = [
      { hex: '#4f7cff', rgb: '79,124,255' },
      { hex: '#10b981', rgb: '16,185,129' },
      { hex: '#f59e0b', rgb: '245,158,11' },
      { hex: '#8b5cf6', rgb: '139,92,246' },
      { hex: '#06b6d4', rgb: '6,182,212' },
      { hex: '#ef4444', rgb: '239,68,68' },
      { hex: '#14b8a6', rgb: '20,184,166' },
      { hex: '#f97316', rgb: '249,115,22' },
      { hex: '#6366f1', rgb: '99,102,241' },
      { hex: '#84cc16', rgb: '132,204,22' }
    ];

    // 任务数据结构：移除 endWork
    let tasks = [
      { id: uid(), name: '烧水', type: 'waiting', duration: 0, startWork: 1, wait: 10, depsText: '', lockedStart: null, lane: null },
      { id: uid(), name: '泡发木耳', type: 'waiting', duration: 0, startWork: 1, wait: 20, depsText: '', lockedStart: null, lane: null },
      { id: uid(), name: '扔垃圾', type: 'continuous', duration: 6, startWork: 0, wait: 0, depsText: '', lockedStart: null, lane: null },
      { id: uid(), name: '切菜', type: 'continuous', duration: 5, startWork: 0, wait: 0, depsText: '', lockedStart: null, lane: null },
      { id: uid(), name: '煮面', type: 'continuous', duration: 8, startWork: 0, wait: 0, depsText: '烧水', lockedStart: null, lane: null },
      { id: uid(), name: '洗澡', type: 'continuous', duration: 15, startWork: 0, wait: 0, depsText: '', lockedStart: null, lane: null }
    ];

    let schedule = null;
    let pxPerMinute = 34;
    let suppressTableRender = false;
    let toastTimer = null;

    const $ = (id) => document.getElementById(id);
    const taskRows = $('taskRows');
    const lanesEl = $('lanes');
    const timeAxis = $('timeAxis');
    const timelineInner = $('timelineInner');
    const warningBox = $('warningBox');
    const statsEl = $('stats');
    const nowLine = $('nowLine');

    function uid() {
      return 't_' + Math.random().toString(36).slice(2, 10);
    }

    function num(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? Math.max(0, Math.round(n)) : fallback;
    }

    function escapeHTML(str) {
      return String(str ?? '').replace(/[&<>'"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));
    }

    function normalizeName(name) {
      return String(name || '').trim().toLowerCase();
    }

    function showToast(message) {
      const toast = $('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function taskTotal(task) {
      if (task.type === 'continuous') return Math.max(1, num(task.duration, 1));
      return Math.max(1, num(task.startWork) + num(task.wait));
    }

    function parseDeps(task, nameMap) {
      if (!task.depsText) return [];
      return task.depsText
        .split(/[,，、]/)
        .map(s => normalizeName(s))
        .filter(Boolean)
        .map(name => nameMap.get(name))
        .filter(Boolean)
        .filter(id => id !== task.id);
    }

    function taskLabel(task) {
      if (task.type === 'continuous') return `持续 ${task.duration} 分钟`;
      const parts = [];
      if (task.startWork > 0) parts.push(`人在 ${task.startWork}`);
      if (task.wait > 0) parts.push(`等待 ${task.wait}`);
      return parts.join(' + ') + ' 分钟';
    }

    function buildOperations(respectLocks = true) {
      const nameMap = new Map();
      tasks.forEach(t => {
        const key = normalizeName(t.name);
        if (key && !nameMap.has(key)) nameMap.set(key, t.id);
      });

      const taskById = new Map(tasks.map(t => [t.id, t]));
      const finalOpByTask = new Map();
      const firstOpByTask = new Map();
      const ops = [];
      const warnings = [];

      function addOp(op) {
        ops.push({ earliest: 0, deps: [], ...op });
        return op.id;
      }

      tasks.forEach((task, index) => {
        const depIds = parseDeps(task, nameMap);
        task.depIds = depIds;
        task.color = palette[index % palette.length];

        if (task.type === 'continuous') {
          const opId = addOp({ id: `${task.id}:work`, taskId: task.id, kind: 'continuous', human: true, duration: Math.max(1, num(task.duration, 1)), deps: [] });
          firstOpByTask.set(task.id, opId);
          finalOpByTask.set(task.id, opId);
        } else {
          const startDur = Math.max(0, num(task.startWork));
          const waitDur = Math.max(0, num(task.wait));
          const startId = addOp({ id: `${task.id}:start`, taskId: task.id, kind: 'start', human: true, duration: Math.max(0, startDur), deps: [] });
          const waitId = addOp({ id: `${task.id}:wait`, taskId: task.id, kind: 'wait', human: false, duration: Math.max(0, waitDur), deps: [startId] });
          firstOpByTask.set(task.id, startId);
          finalOpByTask.set(task.id, waitId);
        }
      });

      tasks.forEach(task => {
        const first = ops.find(o => o.id === firstOpByTask.get(task.id));
        const depNames = [];
        (task.depIds || []).forEach(depTaskId => {
          const finalOp = finalOpByTask.get(depTaskId);
          if (finalOp && first) first.deps.push(finalOp);
          const depTask = taskById.get(depTaskId);
          if (depTask) depNames.push(depTask.name);
        });
        task.depNames = depNames;
        if (respectLocks && task.lockedStart !== null && task.lockedStart !== undefined) {
          first.earliest = Math.max(first.earliest || 0, num(task.lockedStart));
        }
      });

      return { ops, firstOpByTask, finalOpByTask, warnings };
    }

    function scheduleTasks({ respectLocks = true, clearLocks = false } = {}) {
      if (clearLocks) tasks.forEach(t => { t.lockedStart = null; });
      tasks.forEach(t => {
        t.duration = Math.max(0, num(t.duration));
        t.startWork = Math.max(0, num(t.startWork));
        t.wait = Math.max(0, num(t.wait));
      });

      const { ops, finalOpByTask } = buildOperations(respectLocks);
      const opMap = new Map(ops.map(o => [o.id, o]));
      const scheduled = new Map();
      const unscheduled = new Set(ops.map(o => o.id));
      const warnings = [];
      let humanTime = 0;
      let guard = 0;

      function depsDone(op) {
        return op.deps.every(id => scheduled.has(id));
      }

      function readyTime(op) {
        const depFinish = op.deps.reduce((m, id) => Math.max(m, scheduled.get(id)?.end ?? 0), 0);
        return Math.max(depFinish, op.earliest || 0);
      }

      function scheduleOp(op, start) {
        const safeDuration = Math.max(0, op.duration);
        scheduled.set(op.id, { ...op, start, end: start + safeDuration });
        unscheduled.delete(op.id);
      }

      function flushNonHuman() {
        let changed = true;
        while (changed) {
          changed = false;
          for (const id of Array.from(unscheduled)) {
            const op = opMap.get(id);
            if (!op.human && depsDone(op)) {
              const start = readyTime(op);
              scheduleOp(op, start);
              changed = true;
            }
          }
        }
      }

      while (unscheduled.size && guard++ < 500) {
        flushNonHuman();
        const humanOps = Array.from(unscheduled).map(id => opMap.get(id)).filter(op => op.human && depsDone(op));
        if (!humanOps.length) {
          const unresolved = Array.from(unscheduled).map(id => opMap.get(id));
          if (unresolved.length) warnings.push('存在循环依赖或无法解析的前置关系，部分任务无法排程。');
          break;
        }
        const enriched = humanOps.map(op => ({ op, rt: readyTime(op), priority: priority(op) }));
        const minReady = Math.min(...enriched.map(x => x.rt));
        if (humanTime < minReady) humanTime = minReady;
        const available = enriched.filter(x => x.rt <= humanTime + 0.0001);
        const pool = available.length ? available : enriched.filter(x => x.rt === minReady);
        pool.sort((a, b) => b.priority - a.priority || a.rt - b.rt || a.op.duration - b.op.duration);
        const chosen = pool[0].op;
        const start = Math.max(humanTime, readyTime(chosen));
        scheduleOp(chosen, start);
        humanTime = start + Math.max(0, chosen.duration);
      }
      flushNonHuman();

      function priority(op) {
        const task = tasks.find(t => t.id === op.taskId);
        if (!task) return 0;
        const downstreamCount = tasks.filter(t => (t.depIds || []).includes(task.id)).length;
        if (op.kind === 'start') return 10000 + task.wait * 100 + downstreamCount * 150;
        if (op.kind === 'wait') return 9000 + downstreamCount * 250;
        if (op.kind === 'continuous') return downstreamCount * 300 - task.duration;
        return 0;
      }

      const taskSchedules = tasks.map((task, index) => {
        const color = palette[index % palette.length];
        const segments = Array.from(scheduled.values())
          .filter(op => op.taskId === task.id)
          .sort((a, b) => a.start - b.start || a.end - b.end);
        const start = segments.length ? Math.min(...segments.map(s => s.start)) : 0;
        const end = segments.length ? Math.max(...segments.map(s => s.end)) : start + taskTotal(task);
        const finalOpId = finalOpByTask.get(task.id);
        const complete = scheduled.get(finalOpId)?.end ?? end;
        const requestedTooEarly = task.lockedStart !== null && task.lockedStart !== undefined && start > task.lockedStart;
        return { task, color, segments, start, end, complete, requestedTooEarly };
      });

      assignLanes(taskSchedules);

      const makespan = taskSchedules.reduce((m, s) => Math.max(m, s.end), 0);
      const busyTime = Array.from(scheduled.values()).filter(o => o.human).reduce((m, o) => m + Math.max(0, o.end - o.start), 0);
      const waitTime = Array.from(scheduled.values()).filter(o => !o.human).reduce((m, o) => m + Math.max(0, o.end - o.start), 0);

      schedule = { taskSchedules, ops: Array.from(scheduled.values()), warnings, makespan, busyTime, waitTime };
      renderAll();
    }

    // 强制依赖同lane，并禁止拖动改变lane
    function assignLanes(taskSchedules) {
      const parent = new Map();
      tasks.forEach(t => parent.set(t.id, t.id));
      function find(id) {
        if (parent.get(id) !== id) parent.set(id, find(parent.get(id)));
        return parent.get(id);
      }
      function union(a, b) {
        const ra = find(a), rb = find(b);
        if (ra !== rb) parent.set(ra, rb);
      }

      tasks.forEach(t => {
        (t.depIds || []).forEach(depId => {
          if (depId !== t.id) union(t.id, depId);
        });
      });

      const groups = new Map();
      tasks.forEach(t => {
        const root = find(t.id);
        if (!groups.has(root)) groups.set(root, []);
        groups.get(root).push(t.id);
      });

      const idMap = new Map(taskSchedules.map(s => [s.task.id, s]));
      const assigned = new Map();
      const depGroups = Array.from(groups.values()).filter(g => g.length > 1);
      const singletonGroups = Array.from(groups.values()).filter(g => g.length === 1);
      const occupancy = new Map();
      const depGroupBounds = [];
      let nextLane = 0;

      depGroups
        .sort((a, b) => Math.min(...a.map(id => idMap.get(id)?.start ?? 0)) - Math.min(...b.map(id => idMap.get(id)?.start ?? 0)))
        .forEach((group, groupIndex) => {
          const baseLane = nextLane;
          const laneIntervals = [];
          const groupItems = group
            .map(taskId => idMap.get(taskId))
            .filter(Boolean)
            .sort((a, b) => a.start - b.start || a.end - b.end);

          groupItems.forEach(item => {
            let offset = 0;
            while (true) {
              const intervals = laneIntervals[offset] || [];
              const conflict = intervals.some(iv => intervalsOverlap(item.start, item.end, iv.start, iv.end));
              if (!conflict) {
                if (!laneIntervals[offset]) laneIntervals[offset] = [];
                laneIntervals[offset].push({ start: item.start, end: item.end });
                assigned.set(item.task.id, baseLane + offset);
                break;
              }
              offset++;
            }
          });

          const usedRows = Math.max(1, laneIntervals.length);
          const groupStart = Math.min(...groupItems.map(item => item.start));
          const groupEnd = Math.max(...groupItems.map(item => item.end));
          const minLane = baseLane;
          const maxLane = baseLane + usedRows - 1;
          const taskIds = groupItems.map(item => item.task.id);

          for (let lane = minLane; lane <= maxLane; lane++) {
            if (!occupancy.has(lane)) occupancy.set(lane, []);
            occupancy.get(lane).push({ start: groupStart, end: groupEnd, dependencyBox: true });
          }

          depGroupBounds.push({ id: `dep_${groupIndex}`, taskIds, start: groupStart, end: groupEnd, minLane, maxLane });
          nextLane += usedRows;
        });

      singletonGroups.forEach(group => {
        const taskId = group[0];
        const s = idMap.get(taskId);
        if (!s) return;
        const preferredLane = Number.isInteger(s.task.lane) && s.task.lane >= 0 ? s.task.lane : 0;
        let lane = preferredLane;
        let triedPreferred = false;
        while (true) {
          const intervals = occupancy.get(lane) || [];
          const conflict = intervals.some(iv => intervalsOverlap(s.start, s.end, iv.start, iv.end));
          if (!conflict) {
            if (!occupancy.has(lane)) occupancy.set(lane, []);
            occupancy.get(lane).push({ start: s.start, end: s.end });
            assigned.set(taskId, lane);
            break;
          }
          if (!triedPreferred && preferredLane !== 0) {
            lane = 0;
            triedPreferred = true;
          } else {
            lane++;
          }
        }
      });

      taskSchedules.forEach(s => {
        s.lane = assigned.get(s.task.id) ?? 0;
        s.isDependencyGroup = depGroups.some(g => g.includes(s.task.id));
      });

      window._depGroups = depGroups;
      window._depGroupBounds = depGroupBounds;
    }

    function intervalsOverlap(a1, a2, b1, b2) {
      return Math.max(a1, b1) < Math.min(a2, b2);
    }

    function overlapsForeignDependencyBox(taskId, lane, start, end) {
      const depBounds = window._depGroupBounds || [];
      return depBounds.some(bounds => {
        const sameGroup = bounds.taskIds.includes(taskId);
        const laneInside = lane >= bounds.minLane && lane <= bounds.maxLane;
        const timeInside = intervalsOverlap(start, end, bounds.start, bounds.end);
        return !sameGroup && laneInside && timeInside;
      });
    }

    function renderAll() {
      if (!suppressTableRender) renderTable();
      renderStats();
      renderTimeline();
      renderJson();
    }

    function nameExistsForOtherTask(name, currentId) {
      const key = normalizeName(name);
      if (!key) return false;
      return tasks.some(t => t.id !== currentId && normalizeName(t.name) === key);
    }

    function makeUniqueTaskName(baseName) {
      const base = String(baseName || '新任务').trim() || '新任务';
      let name = base;
      let i = 2;
      while (tasks.some(t => normalizeName(t.name) === normalizeName(name))) {
        name = `${base} ${i}`;
        i++;
      }
      return name;
    }

    function renameDependencies(oldName, newName, taskId) {
      const oldKey = normalizeName(oldName);
      if (!oldKey || normalizeName(oldName) === normalizeName(newName)) return;
      tasks.forEach(t => {
        if (t.id === taskId || !t.depsText) return;
        const deps = t.depsText.split(/[,，、]/).map(s => s.trim()).filter(Boolean);
        let changed = false;
        const next = deps.map(dep => {
          if (normalizeName(dep) === oldKey) {
            changed = true;
            return newName;
          }
          return dep;
        });
        if (changed) t.depsText = next.join('，');
      });
    }

    function renderTable() {
      taskRows.innerHTML = tasks.map((task, index) => {
        const selectedNames = String(task.depsText || '')
          .split(/[,，、]/)
          .map(s => s.trim())
          .filter(Boolean);
        const selectedSet = new Set(selectedNames.map(normalizeName));
        const depSummary = selectedNames.length ? selectedNames.join('，') : '无';
        const options = tasks
          .filter(t => t.id !== task.id)
          .map(t => {
            const checked = selectedSet.has(normalizeName(t.name));
            return `
              <label class="dep-option">
                <input type="checkbox" data-dep-target="${task.id}" value="${escapeHTML(t.name)}" ${checked ? 'checked' : ''} />
                <span>${escapeHTML(t.name || '未命名任务')}</span>
              </label>
            `;
          })
          .join('');
        const isContinuous = task.type === 'continuous';
        return `
        <tr data-task-id="${task.id}">
          <td class="col-name"><input data-field="name" value="${escapeHTML(task.name)}" /></td>
          <td class="col-type">
            <select data-field="type">
              <option value="continuous" ${isContinuous ? 'selected' : ''}>持续</option>
              <option value="waiting" ${!isContinuous ? 'selected' : ''}>等待</option>
            </select>
          </td>
          <td class="col-small">
            <input data-field="duration" type="number" min="0" value="${task.duration}" class="field-continuous ${isContinuous ? '' : 'hidden'}" />
          </td>
          <td class="col-small">
            <input data-field="startWork" type="number" min="0" value="${task.startWork}" class="field-waiting ${isContinuous ? 'hidden' : ''}" />
          </td>
          <td class="col-small">
            <input data-field="wait" type="number" min="0" value="${task.wait}" class="field-waiting ${isContinuous ? 'hidden' : ''}" />
          </td>
          <td class="col-deps">
            <div class="dep-picker" data-task-id="${task.id}">
              <button type="button" class="dep-summary" title="${escapeHTML(depSummary)}">${escapeHTML(depSummary)}</button>
              <div class="dep-menu">${options || '<div class="dep-empty">暂无可选任务</div>'}</div>
            </div>
          </td>
          <td class="col-action"><button class="danger" data-delete="${task.id}" title="删除">×</button></td>
        </tr>
      `}).join('');
    }

    function renderStats() {
      if (!schedule) return;
      const manualCount = tasks.filter(t => t.lockedStart !== null && t.lockedStart !== undefined).length;
      statsEl.innerHTML = `
        <div class="stat"><label>全部完成</label><b>${schedule.makespan} 分钟</b></div>
        <div class="stat"><label>人被占用</label><b>${schedule.busyTime} 分钟</b></div>
        <div class="stat"><label>客观等待</label><b>${schedule.waitTime} 分钟</b></div>
        <div class="stat"><label>手动锁定</label><b>${manualCount} 个</b></div>
      `;
    }

    function chooseTickStep(maxEnd) {
      const targetPx = 72;
      const steps = [1, 2, 5, 10, 15, 30, 60, 90, 120, 180, 240, 360, 720];
      return steps.find(step => step * pxPerMinute >= targetPx) || steps[steps.length - 1];
    }

    function formatMinuteLabel(minute) {
      if (minute < 60) return `${minute}′`;
      const h = Math.floor(minute / 60);
      const m = minute % 60;
      return m === 0 ? `${h}h` : `${h}h${m}`;
    }

    function updateWaitingBlockVisual(block, startWorkMinutes, totalMinutes) {
      const safeTotal = Math.max(1, totalMinutes);
      const pct = Math.max(0, Math.min(100, startWorkMinutes / safeTotal * 100));
      const startHandle = block.querySelector('.start-resize-handle');
      const startFill = block.querySelector('.wait-start');
      const waitFill = block.querySelector('.wait-gradient');
      if (startHandle) startHandle.style.left = `${pct}%`;
      if (startFill) {
        startFill.style.left = '0%';
        startFill.style.width = `${pct}%`;
      }
      if (waitFill) {
        waitFill.style.left = `${pct}%`;
        waitFill.style.width = `${100 - pct}%`;
      }
    }

    function renderTimeline() {
      if (!schedule) return;
      const maxEnd = Math.max(30, Math.ceil((schedule.makespan + 8) / 5) * 5);
      const laneCount = Math.max(1, 1 + Math.max(0, ...schedule.taskSchedules.map(s => s.lane || 0)));
      const width = Math.max(900, maxEnd * pxPerMinute);
      const height = laneCount * 72;

      timelineInner.style.width = `${width + 132}px`;
      lanesEl.style.width = `${width}px`;
      lanesEl.style.height = `${height}px`;
      timeAxis.style.width = `${width}px`;
      nowLine.style.left = `132px`;

      const tickStep = chooseTickStep(maxEnd);
      const majorStep = tickStep < 10 ? 10 : tickStep * 2;
      const ticks = [];
      for (let m = 0; m <= maxEnd; m += tickStep) {
        ticks.push(`<div class="tick ${m % majorStep === 0 ? '' : 'minor'}" style="left:${m * pxPerMinute}px;width:${tickStep * pxPerMinute}px">${formatMinuteLabel(m)}</div>`);
      }
      timeAxis.innerHTML = `<div class="axis-label">时间</div>${ticks.join('')}`;

      const gridLines = [];
      for (let m = 0; m <= maxEnd; m += tickStep) {
        gridLines.push(`<div class="grid-line ${m % majorStep === 0 ? 'major' : ''}" style="left:${m * pxPerMinute}px"></div>`);
      }

      const lanes = [];
      for (let i = 0; i < laneCount; i++) {
        lanes.push(`<div class="lane" data-lane="${i}"><div class="lane-label">行 ${i + 1}<span>可并行显示行</span></div>${gridLines.join('')}</div>`);
      }
      lanesEl.innerHTML = lanes.join('');

      if (!schedule.taskSchedules.length) {
        lanesEl.innerHTML = '<div class="empty-state">还没有任务。</div>';
        return;
      }

      // 存储每个任务块的DOM元素引用以便绘制依赖虚线框
      const taskBlocks = [];
      schedule.taskSchedules.forEach(item => {
        const block = renderTaskBlock(item);
        taskBlocks.push({ item, block });
      });

      // 绘制依赖虚线框，不再画连接箭头
      drawDependencyBoxes(taskBlocks);

      const warningMessages = [...new Set([
        ...schedule.warnings,
        ...schedule.taskSchedules.filter(s => s.requestedTooEarly).map(s => `「${s.task.name}」被拖到较早位置，但因为前置关系或人力冲突，已自动贴到最近可行时间。`)
      ])];
      warningBox.innerHTML = warningMessages.map(escapeHTML).join('<br>');
      warningBox.classList.toggle('show', warningMessages.length > 0);
    }

    function renderTaskBlock(item) {
      const { task, color, start, end, lane } = item;
      const left = start * pxPerMinute;
      const top = (lane * 72) + 12;
      const width = Math.max(28, (end - start) * pxPerMinute);
      const block = document.createElement('div');
      block.className = `task-block ${task.type === 'waiting' ? 'waiting' : 'continuous'} ${task.lockedStart !== null && task.lockedStart !== undefined ? 'locked' : ''} ${item.requestedTooEarly ? 'invalid' : ''}`;
      block.dataset.taskId = task.id;
      block.style.left = `${left}px`;
      block.style.top = `${top}px`;
      block.style.width = `${width}px`;
      block.style.setProperty('--task-color', color.hex);
      block.style.setProperty('--task-rgb', color.rgb);

      if (task.type === 'waiting') {
        const segs = item.segments;
        const startSeg = segs.find(s => s.kind === 'start');
        const waitSeg = segs.find(s => s.kind === 'wait');
        const total = Math.max(1, end - start);

        if (startSeg && startSeg.end > startSeg.start) {
          const el = document.createElement('div');
          el.className = 'wait-start';
          setSegmentStyle(el, startSeg.start - start, startSeg.end - start, total);
          block.appendChild(el);
        }
        if (waitSeg && waitSeg.end > waitSeg.start) {
          const el = document.createElement('div');
          el.className = 'wait-gradient';
          setSegmentStyle(el, waitSeg.start - start, waitSeg.end - start, total);
          block.appendChild(el);
        }

        const startHandle = document.createElement('div');
        startHandle.className = 'start-resize-handle';
        const startRatio = Math.max(0, Math.min(1, num(task.startWork) / Math.max(1, taskTotal(task))));
        startHandle.style.left = `${startRatio * 100}%`;
        startHandle.title = '拖动调整启动部分持续时间';
        block.appendChild(startHandle);
      }

      const content = document.createElement('div');
      content.className = 'task-content';
      content.innerHTML = `
        <div class="task-title">${escapeHTML(task.name || '未命名任务')}</div>
        <div class="task-meta">${escapeHTML(`${Math.round(start)}′–${Math.round(end)}′ · ${taskLabel(task)}`)}</div>
      `;
      block.appendChild(content);

      const handle = document.createElement('div');
      handle.className = 'resize-handle';
      handle.title = task.type === 'continuous' ? '拖动调整持续时间' : '拖动调整总长度/等待时间';
      block.appendChild(handle);

      lanesEl.appendChild(block);
      attachBlockInteractions(block, item);
      return block;
    }

    function setSegmentStyle(el, startOffset, endOffset, total) {
      const l = Math.max(0, startOffset) / total * 100;
      const w = Math.max(0, endOffset - startOffset) / total * 100;
      el.style.left = `${l}%`;
      el.style.width = `${w}%`;
    }

    function drawDependencyBoxes(taskBlocks) {
      const oldSvg = document.querySelector('.arrow-svg');
      if (oldSvg) oldSvg.remove();
      lanesEl.querySelectorAll('.dependency-box').forEach(el => el.remove());

      const blockMap = new Map();
      taskBlocks.forEach(({ item, block }) => {
        blockMap.set(item.task.id, { item, block });
      });

      const depBounds = window._depGroupBounds || [];
      depBounds.forEach(bounds => {
        const related = bounds.taskIds.map(id => blockMap.get(id)).filter(Boolean);
        if (related.length < 2) return;
        const left = Math.min(...related.map(x => x.item.start * pxPerMinute));
        const right = Math.max(...related.map(x => x.item.end * pxPerMinute));
        const minLane = Math.min(...related.map(x => x.item.lane || 0));
        const maxLane = Math.max(...related.map(x => x.item.lane || 0));
        bounds.start = Math.min(...related.map(x => x.item.start));
        bounds.end = Math.max(...related.map(x => x.item.end));
        bounds.minLane = minLane;
        bounds.maxLane = maxLane;

        const box = document.createElement('div');
        box.className = 'dependency-box';
        box.style.left = `${Math.max(0, left - 8)}px`;
        box.style.top = `${minLane * 72 + 6}px`;
        box.style.width = `${Math.max(24, right - left + 16)}px`;
        box.style.height = `${(maxLane - minLane + 1) * 72 - 12}px`;
        lanesEl.appendChild(box);
      });
    }

    function renderJson() {
      const jsonText = $('jsonText');
      if (!jsonText) return;
      jsonText.value = JSON.stringify(tasks.map(t => ({
        name: t.name,
        type: t.type,
        duration: t.duration,
        startWork: t.startWork,
        wait: t.wait,
        depsText: t.depsText,
        lockedStart: t.lockedStart,
        lane: t.lane
      })), null, 2);
    }

    function updateTaskFromInput(input) {
      const row = input.closest('tr');
      if (!row) return;
      const task = tasks.find(t => t.id === row.dataset.taskId);
      if (!task) return;
      const field = input.dataset.field;
      if (!field) return;

      if (field === 'name') {
        const proposed = input.value.trim();
        if (!proposed) {
          input.value = task.name;
          showToast('任务名不能为空');
          return;
        }
        if (nameExistsForOtherTask(proposed, task.id)) {
          input.value = task.name;
          showToast(`已经有一个任务叫「${proposed}」，请换一个名字`);
          return;
        }
        const oldName = task.name;
        task.name = proposed;
        renameDependencies(oldName, proposed, task.id);
      } else if (['duration', 'startWork', 'wait'].includes(field)) {
        task[field] = num(input.value);
      } else {
        task[field] = input.value;
      }
      task.lockedStart = null;

      if (field === 'type') {
        const isContinuous = task.type === 'continuous';
        const contField = row.querySelector('[data-field="duration"]');
        const waitFields = row.querySelectorAll('[data-field="startWork"], [data-field="wait"]');
        contField.classList.toggle('hidden', !isContinuous);
        waitFields.forEach(el => el.classList.toggle('hidden', isContinuous));
        if (isContinuous) {
          task.duration = Math.max(1, task.duration || task.startWork || 5);
          task.startWork = 0;
          task.wait = 0;
        } else {
          task.duration = 0;
          task.startWork = Math.max(1, task.startWork || 1);
          task.wait = Math.max(1, task.wait || 10);
        }
      }
      scheduleTasks({ respectLocks: true });
    }

    function attachBlockInteractions(block, item) {
      const task = item.task;
      const handle = block.querySelector('.resize-handle');
      const startHandle = block.querySelector('.start-resize-handle');
      let mode = null;
      let pointerId = null;
      let startX = 0;
      let startY = 0;
      let originalLane = 0;
      let blockLeft = 0;
      let blockTop = 0;
      let blockWidth = 0;
      let originalStartWork = 0;
      let originalWait = 0;
      let originalTotal = 0;
      let originalLockedStart = null;
      let originalTaskLane = null;
      let liveStartWork = 0;
      let liveTotal = 0;

      block.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        pointerId = e.pointerId;
        block.setPointerCapture(pointerId);
        if (e.target === handle) {
          mode = 'resize';
        } else if (e.target === startHandle) {
          mode = 'startResize';
        } else {
          mode = 'drag';
        }
        startX = e.clientX;
        startY = e.clientY;
        originalLane = item.lane || 0;
        blockLeft = parseFloat(block.style.left || '0');
        blockTop = parseFloat(block.style.top || '0');
        blockWidth = parseFloat(block.style.width || '0');
        originalStartWork = num(task.startWork);
        originalWait = num(task.wait);
        originalTotal = Math.max(1, taskTotal(task));
        originalLockedStart = task.lockedStart;
        originalTaskLane = task.lane;
        liveStartWork = originalStartWork;
        liveTotal = originalTotal;
        block.classList.add('dragging');
      });

      block.addEventListener('pointermove', (e) => {
        if (!mode || e.pointerId !== pointerId) return;
        e.preventDefault();
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (mode === 'drag') {
          const newLeft = Math.max(0, blockLeft + dx);
          const newTop = Math.max(12, blockTop + dy);
          block.style.left = `${newLeft}px`;
          block.style.top = `${newTop}px`;
        } else if (mode === 'resize') {
          if (task.type === 'waiting') {
            const minTotal = Math.max(1, originalStartWork);
            liveTotal = Math.max(minTotal, Math.round((blockWidth + dx) / pxPerMinute));
            const newWidth = Math.max(28, liveTotal * pxPerMinute);
            block.style.width = `${newWidth}px`;
            updateWaitingBlockVisual(block, originalStartWork, liveTotal);
          } else {
            const newWidth = Math.max(28, blockWidth + dx);
            block.style.width = `${newWidth}px`;
          }
        } else if (mode === 'startResize') {
          liveStartWork = Math.max(0, Math.round((originalStartWork * pxPerMinute + dx) / pxPerMinute));
          liveTotal = Math.max(1, liveStartWork + originalWait);
          const newWidth = Math.max(28, liveTotal * pxPerMinute);
          block.style.width = `${newWidth}px`;
          updateWaitingBlockVisual(block, liveStartWork, liveTotal);
        }
      });

      block.addEventListener('pointerup', (e) => finishPointer(e));
      block.addEventListener('pointercancel', (e) => finishPointer(e));

      function finishPointer(e) {
        if (!mode || e.pointerId !== pointerId) return;
        block.classList.remove('dragging');
        try { block.releasePointerCapture(pointerId); } catch (err) {}

        if (mode === 'drag') {
          const newLeft = parseFloat(block.style.left || '0');
          const newTop = parseFloat(block.style.top || '0');
          const snappedStart = Math.max(0, Math.round(newLeft / pxPerMinute));
          const snappedLane = Math.max(0, Math.round((newTop - 12) / 72));
          const isDepGroup = window._depGroups ? window._depGroups.some(g => g.includes(task.id)) : false;
          const targetLane = isDepGroup ? originalLane : snappedLane;
          const visualLength = Math.max(1, Math.round((item.end - item.start) || taskTotal(task)));

          if (overlapsForeignDependencyBox(task.id, targetLane, snappedStart, snappedStart + visualLength)) {
            task.lockedStart = originalLockedStart;
            task.lane = originalTaskLane;
            block.style.left = `${blockLeft}px`;
            block.style.top = `${blockTop}px`;
            showToast(`「${task.name}」不属于该逻辑组，不能拖进虚线框`);
          } else {
            if (isDepGroup) {
              block.style.top = `${originalLane * 72 + 12}px`;
              showToast(`「${task.name}」有依赖关系，不能移动到其他行`);
            } else {
              task.lane = snappedLane;
            }
            task.lockedStart = snappedStart;
            showToast(`已把「${task.name}」设为 ${snappedStart} 分钟开始`);
          }
        } else if (mode === 'resize') {
          const newWidth = parseFloat(block.style.width || '0');
          const newTotal = Math.max(1, Math.round(newWidth / pxPerMinute));
          if (task.type === 'continuous') {
            task.duration = Math.max(1, newTotal);
            showToast(`「${task.name}」持续时间改为 ${task.duration} 分钟`);
          } else {
            const fixed = num(task.startWork);
            const total = Math.max(fixed, newTotal);
            task.wait = Math.max(0, total - fixed);
            showToast(`「${task.name}」等待时间改为 ${task.wait} 分钟，总长度 ${fixed + task.wait} 分钟`);
          }
        } else if (mode === 'startResize') {
          task.startWork = Math.max(0, liveStartWork);
          task.wait = Math.max(0, originalWait);
          showToast(`「${task.name}」启动部分改为 ${task.startWork} 分钟，总长度 ${task.startWork + task.wait} 分钟`);
        }
        mode = null;
        pointerId = null;
        suppressTableRender = false;
        scheduleTasks({ respectLocks: true });
      }
    }

    // 事件监听
    taskRows.addEventListener('input', (e) => {
      if (e.target.matches('input')) {
        suppressTableRender = true;
        updateTaskFromInput(e.target);
        suppressTableRender = false;
      }
    });

    taskRows.addEventListener('change', (e) => {
      const depCheckbox = e.target.closest('input[data-dep-target]');
      if (depCheckbox) {
        const task = tasks.find(t => t.id === depCheckbox.dataset.depTarget);
        if (!task) return;
        const picker = depCheckbox.closest('.dep-picker');
        const selected = Array.from(picker.querySelectorAll('input[data-dep-target]:checked')).map(input => input.value);
        task.depsText = selected.join('，');
        task.lockedStart = null;
        const summary = picker.querySelector('.dep-summary');
        const text = selected.length ? selected.join('，') : '无';
        summary.textContent = text;
        summary.title = text;
        suppressTableRender = true;
        scheduleTasks({ respectLocks: true });
        suppressTableRender = false;
        return;
      }
      if (e.target.matches('select')) updateTaskFromInput(e.target);
    });

    taskRows.addEventListener('click', (e) => {
      const summaryBtn = e.target.closest('.dep-summary');
      if (summaryBtn) {
        e.preventDefault();
        e.stopPropagation();
        const picker = summaryBtn.closest('.dep-picker');
        document.querySelectorAll('.dep-picker.open').forEach(el => {
          if (el !== picker) el.classList.remove('open');
        });
        picker.classList.toggle('open');
        return;
      }

      const id = e.target.dataset.delete;
      if (!id) return;
      const deletedTask = tasks.find(t => t.id === id);
      tasks = tasks.filter(t => t.id !== id);
      if (deletedTask) {
        tasks.forEach(t => {
          const deps = String(t.depsText || '').split(/[,，、]/).map(s => s.trim()).filter(Boolean);
          const newDeps = deps.filter(d => normalizeName(d) !== normalizeName(deletedTask.name));
          t.depsText = newDeps.join('，');
        });
      }
      scheduleTasks({ respectLocks: true });
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dep-picker')) {
        document.querySelectorAll('.dep-picker.open').forEach(el => el.classList.remove('open'));
      }
    });

    $('addTask').addEventListener('click', () => {
      const name = makeUniqueTaskName(`新任务 ${tasks.length + 1}`);
      tasks.push({ id: uid(), name, type: 'continuous', duration: 5, startWork: 0, wait: 0, depsText: '', lockedStart: null, lane: null });
      scheduleTasks({ respectLocks: true });
      showToast(`已新增「${name}」`);
    });

    function openClearConfirm() {
      const modal = $('confirmClearModal');
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeClearConfirm() {
      const modal = $('confirmClearModal');
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden', 'true');
    }

    $('clearAllTasks').addEventListener('click', openClearConfirm);

    $('cancelClear').addEventListener('click', closeClearConfirm);

    $('confirmClear').addEventListener('click', () => {
      tasks = [];
      closeClearConfirm();
      scheduleTasks({ respectLocks: false, clearLocks: true });
      showToast('已清空全部任务');
    });

    $('confirmClearModal').addEventListener('click', (e) => {
      if (e.target.id === 'confirmClearModal') closeClearConfirm();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeClearConfirm();
    });

    $('autoSchedule').addEventListener('click', () => {
      scheduleTasks({ respectLocks: false, clearLocks: true });
      showToast('已重新自动排序');
    });

    $('resetLocks').addEventListener('click', () => {
      tasks.forEach(t => { t.lockedStart = null; t.lane = null; });
      scheduleTasks({ respectLocks: false });
      showToast('已清除手动拖动');
    });

    $('scaleRange').addEventListener('input', (e) => {
      pxPerMinute = Number(e.target.value);
      document.documentElement.style.setProperty('--minute-width', `${pxPerMinute}px`);
      $('scaleText').textContent = `${pxPerMinute} px/分钟`;
      renderTimeline();
    });

    $('fitView').addEventListener('click', () => {
      if (!schedule) return;
      const scroll = $('timelineScroll');
      const available = Math.max(520, scroll.clientWidth - 152);
      const maxEnd = Math.max(30, Math.ceil((schedule.makespan + 8) / 5) * 5);
      pxPerMinute = Math.max(2, Math.min(72, Math.floor(available / maxEnd)));
      $('scaleRange').value = pxPerMinute;
      $('scaleText').textContent = `${pxPerMinute} px/分钟`;
      renderTimeline();
      showToast('已适配当前宽度');
    });

    $('toggleJson').addEventListener('click', () => {
      const panel = $('jsonPanel');
      const shouldShow = !panel.classList.contains('show');
      panel.classList.toggle('show', shouldShow);
      if (shouldShow) renderJson();
    });

    $('jsonText').addEventListener('blur', () => {
      const panel = $('jsonPanel');
      if (!panel.classList.contains('show')) return;
      try {
        const parsed = JSON.parse($('jsonText').value);
        if (!Array.isArray(parsed)) throw new Error('JSON 必须是数组');
        tasks = parsed.map((t, i) => ({
          id: uid(),
          name: String(t.name || `任务 ${i + 1}`),
          type: t.type === 'waiting' ? 'waiting' : 'continuous',
          duration: num(t.duration, 5),
          startWork: num(t.startWork, 0),
          wait: num(t.wait, 0),
          depsText: String(t.depsText || ''),
          lockedStart: t.lockedStart === null || t.lockedStart === undefined ? null : num(t.lockedStart),
          lane: t.lane === null || t.lane === undefined ? null : num(t.lane)
        }));
        scheduleTasks({ respectLocks: true });
        showToast('JSON 已导入');
      } catch (err) {
        showToast('JSON 格式有误，未导入');
        renderJson();
      }
    });

    window.addEventListener('resize', () => {
      if (schedule) renderTimeline();
    });

    scheduleTasks({ respectLocks: false, clearLocks: true });
  </script>
</body>
</html>
