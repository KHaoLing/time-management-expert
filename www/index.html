<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>并行任务排程器 · 手机竖屏版</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --panel:#fff;
      --text:#172033;
      --muted:#64748b;
      --line:#e5e7eb;
      --line2:#cbd5e1;
      --primary:#315efb;
      --soft:#e8edff;
      --danger:#dc2626;
      --ok:#10b981;
      --warn:#f59e0b;
      --shadow:0 14px 34px rgba(15,23,42,.10);
      --radius:18px;
      --bottom:72px;
      --header:54px;
      --axis:44px;
      --lane:80px;
      --topbar:38px;
      --ppm:8px;
      --safe-top:max(22px,env(safe-area-inset-top,0px));
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);overflow:hidden}
    button,input,select{font:inherit}
    input[type=number]{-moz-appearance:textfield;appearance:textfield}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .phone{height:100dvh;display:flex;flex-direction:column;background:radial-gradient(circle at 15% -10%,rgba(49,94,251,.14),transparent 34%),radial-gradient(circle at 100% 0%,rgba(16,185,129,.10),transparent 28%),var(--bg)}
    .app-header{height:calc(var(--header) + var(--safe-top));padding:calc(10px + var(--safe-top)) 14px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex:0 0 calc(var(--header) + var(--safe-top))}
    .title{min-width:0}.title h1{margin:0;font-size:17px;letter-spacing:-.03em;line-height:1.1}.title span{display:block;color:var(--muted);font-size:11px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .header-stat{display:flex;gap:6px;align-items:center;flex-shrink:0}.mini{background:rgba(255,255,255,.86);border:1px solid var(--line);box-shadow:0 8px 18px rgba(15,23,42,.06);border-radius:12px;padding:6px 8px;min-width:54px;text-align:center}.mini b{display:block;font-size:13px}.mini small{display:block;color:var(--muted);font-size:9px;margin-top:1px}
    .screen{display:none;flex:1;min-height:0;padding:0 12px calc(var(--bottom) + env(safe-area-inset-bottom));overflow:auto}.screen.active{display:block}
    .card{background:rgba(255,255,255,.92);border:1px solid rgba(229,231,235,.92);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(12px)}
    .toolbar{display:flex;gap:8px;align-items:center;padding:10px 2px 12px;position:sticky;top:0;z-index:4;background:linear-gradient(to bottom,var(--bg) 80%,rgba(246,247,251,0));backdrop-filter:blur(8px)}
    .toolbar button,.pill-btn{border:0;border-radius:13px;background:var(--primary);color:#fff;padding:10px 12px;font-weight:900;font-size:13px;box-shadow:0 10px 20px rgba(49,94,251,.16)}
    .toolbar button.secondary,.pill-btn.secondary{background:#eef2ff;color:#1e3a8a;border:1px solid #dbe3ff;box-shadow:none}.toolbar button.danger{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;box-shadow:none}.grow{flex:1}
    .task-list{display:grid;gap:10px;padding-bottom:16px}.task-card{padding:12px;border-radius:18px;background:rgba(255,255,255,.92);border:1px solid var(--line);box-shadow:0 8px 20px rgba(15,23,42,.06)}
    .task-head{display:flex;gap:8px;align-items:center;margin-bottom:10px}.task-head input{font-size:16px;font-weight:900;letter-spacing:-.02em}.delete{width:34px;height:34px;border-radius:11px;border:1px solid #fecaca;background:#fff1f2;color:#b91c1c;font-weight:900;flex:0 0 34px}
    input,select{height:36px;width:100%;border:1px solid #dbe1ea;border-radius:12px;background:#fff;padding:8px 10px;color:var(--text);outline:none;font-size:13px}input:focus,select:focus{border-color:#8ca8ff;box-shadow:0 0 0 3px rgba(49,94,251,.1)}
    .seg{display:grid;grid-template-columns:1fr 1fr;border:1px solid #dbe3ff;border-radius:13px;overflow:hidden;margin-bottom:10px;background:#f8fafc}.seg button{height:36px;border:0;background:transparent;color:#64748b;font-weight:900}.seg button.active{background:var(--primary);color:white}
    .fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field label{display:block;font-size:11px;color:var(--muted);font-weight:800;margin:0 0 5px}.field.full{grid-column:1/-1}.hidden{display:none!important}
    .deps{margin-top:10px}
    .deps-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
    .deps-head label{font-size:11px;color:var(--muted);font-weight:800}
    .dep-toggle{border:1px solid var(--line);background:#f8fafc;color:var(--primary);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:800;cursor:pointer}
    .dep-toggle:active{background:#eef2ff}
    .dep-summary{font-size:12px;color:var(--muted);padding:2px 0 6px}
    .dep-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding:8px;background:#f8fafc;border-radius:12px}
    .dep-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 9px;color:#334155;font-size:12px;font-weight:800}.dep-chip input{width:auto;height:auto;accent-color:var(--primary);margin:0}.dep-empty{font-size:12px;color:var(--muted);padding:6px 0}
    .hint{margin:10px 0 0;padding:10px 12px;border-radius:14px;background:#fff;border:1px dashed #cbd5e1;color:var(--muted);font-size:12px;line-height:1.55}
    .timeline-wrap{height:calc(100dvh - var(--header) - var(--safe-top) - var(--bottom) - 72px);min-height:420px;margin-top:8px;border-radius:20px;overflow:hidden;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
    .timeline-tools{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line);background:#fff}.timeline-tools label{font-size:11px;color:var(--muted);font-weight:900}.timeline-tools input[type=range]{width:118px;height:auto;padding:0;box-shadow:none}.timeline-tools .scale-text{font-size:11px;color:var(--muted);font-weight:800;min-width:54px}.timeline-tools .small-btn{border:1px solid var(--line);background:#fff;color:#475569;border-radius:10px;padding:7px 9px;font-size:12px;font-weight:900;box-shadow:none}
    .timeline-tools .primary-btn{border:0;border-radius:10px;background:var(--primary);color:#fff;padding:7px 12px;font-size:12px;font-weight:900;box-shadow:0 6px 14px rgba(49,94,251,.16)}
    .timeline-scroll{height:calc(100% - 45px);overflow:auto;background:#fff;position:relative}.timeline-canvas{position:relative;min-height:100%;user-select:none}.lane-head{position:sticky;top:0;height:var(--topbar);z-index:25;background:rgba(248,250,252,.96);border-bottom:1px solid var(--line2);backdrop-filter:blur(8px)}.lane-label{position:absolute;top:0;height:var(--topbar);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#475569;border-left:1px solid var(--line);background:rgba(248,250,252,.96)}.axis-head{position:sticky;left:0;top:0;width:var(--axis);height:var(--topbar);z-index:30;background:#f8fafc;border-right:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:11px;color:#64748b;font-weight:900}
    .time-tick{position:absolute;left:0;width:100%;border-top:1px solid #eef2f7;pointer-events:none}.time-tick.major{border-top-color:#dbe3ee}.tick-label{position:sticky;left:0;z-index:5;width:var(--axis);transform:translateY(-50%);font-size:10px;font-weight:800;color:#64748b;background:rgba(255,255,255,.88);padding-left:5px;border-right:1px solid var(--line)}
    .lane-bg{position:absolute;top:var(--topbar);bottom:0;border-left:1px solid #eef2f7;background:rgba(248,250,252,.32);pointer-events:none}.lane-bg:nth-child(odd){background:#fff}.dep-box{position:absolute;border:1px dashed rgba(49,94,251,.65);border-radius:16px;background:rgba(49,94,251,.025);pointer-events:none;z-index:6}
    .task-block{position:absolute;border-radius:12px;border:1.5px solid var(--task-color);min-height:26px;overflow:hidden;background:#fff;box-shadow:0 6px 14px rgba(15,23,42,.12);z-index:10;touch-action:none}.task-block.dragging{opacity:.9;z-index:30;box-shadow:0 18px 34px rgba(15,23,42,.24)}.task-block.continuous{background:linear-gradient(180deg,var(--task-color),var(--task-dark));color:white}.task-block.waiting{color:#0f172a}.wait-solid,.wait-gradient{position:absolute;left:0;right:0;pointer-events:none}.wait-solid{top:0;background:var(--task-color);opacity:.95}.wait-gradient{bottom:0;background:linear-gradient(180deg,rgba(var(--task-rgb),.55),rgba(var(--task-rgb),.15) 45%,rgba(255,255,255,.98) 100%)}.start-handle{position:absolute;left:0;right:0;height:14px;transform:translateY(-7px);z-index:8;cursor:ns-resize}.start-handle:before{content:"";position:absolute;left:10px;right:10px;top:6px;border-top:2px dashed rgba(15,23,42,.45)}.resize-handle{position:absolute;left:0;right:0;bottom:0;height:16px;z-index:8;cursor:ns-resize;background:linear-gradient(180deg,transparent,rgba(15,23,42,.12))}.resize-handle:after{content:"";position:absolute;left:50%;bottom:5px;width:28px;height:3px;transform:translateX(-50%);border-radius:99px;background:rgba(255,255,255,.72)}.waiting .resize-handle:after{background:rgba(15,23,42,.25)}.block-content{position:relative;z-index:4;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none;overflow:hidden}.block-title{font-size:11px;font-weight:900;line-height:1.2;writing-mode:vertical-rl;text-orientation:upright;letter-spacing:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-height:100%;display:flex;align-items:center;justify-content:center;padding:2px 0}.task-block.continuous .block-title{color:white}.task-block.waiting .block-title{color:#172033}
    .tabbar{position:fixed;left:0;right:0;bottom:0;height:calc(var(--bottom) + env(safe-area-inset-bottom));padding:8px 16px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);z-index:100}.tab{border:0;border-radius:16px;background:#f1f5f9;color:#64748b;font-weight:900;display:flex;align-items:center;justify-content:center;gap:7px}.tab.active{background:var(--primary);color:white;box-shadow:0 12px 24px rgba(49,94,251,.22)}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.36);display:none;align-items:center;justify-content:center;padding:20px;z-index:150}.modal.show{display:flex}.modal-card{width:min(360px,100%);border-radius:20px;background:#fff;box-shadow:0 28px 70px rgba(15,23,42,.28);padding:18px;border:1px solid var(--line)}.modal-card h3{margin:0 0 8px;font-size:18px}.modal-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.modal-actions button{border-radius:12px;border:1px solid var(--line);padding:9px 12px;font-weight:900}.modal-actions .cancel{background:#fff;color:#475569}.modal-actions .danger{background:#dc2626;color:#fff;border-color:#dc2626}
    .nonoptimal-banner{position:fixed;left:12px;right:12px;bottom:calc(var(--bottom) + env(safe-area-inset-bottom) + 12px);z-index:130;display:none;align-items:center;justify-content:center;border:1px solid #fed7aa;background:#fff7ed;color:#9a3412;border-radius:14px;padding:10px 12px;font-size:13px;font-weight:900;box-shadow:0 14px 34px rgba(15,23,42,.14)}.nonoptimal-banner.show{display:flex}
    .toast{position:fixed;left:50%;bottom:calc(var(--bottom) + 14px);transform:translateX(-50%) translateY(12px);background:rgba(15,23,42,.94);color:white;border-radius:999px;padding:10px 14px;font-size:13px;font-weight:900;box-shadow:0 14px 34px rgba(15,23,42,.24);opacity:0;pointer-events:none;transition:.18s;z-index:200}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .detail-overlay{display:none;position:fixed;inset:0;z-index:140;background:rgba(15,23,42,.28);padding:calc(58px + var(--safe-top)) 14px 20px;align-items:flex-start;justify-content:center}.detail-overlay.show{display:flex}
    .detail-card{width:min(400px,100%);border-radius:20px;background:#fff;box-shadow:0 28px 70px rgba(15,23,42,.28);padding:16px;border:1px solid var(--line);animation:detailSlide .22s ease}
    @keyframes detailSlide{from{opacity:0;transform:translateY(-14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .detail-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.detail-head h3{margin:0;font-size:16px}
    .detail-done{border:0;border-radius:10px;background:var(--primary);color:#fff;padding:7px 16px;font-weight:900;font-size:13px;box-shadow:0 6px 14px rgba(49,94,251,.2)}
    .detail-body .seg{margin-bottom:10px}
    .detail-field label{display:block;font-size:11px;color:var(--muted);font-weight:800;margin:0 0 5px}
    .detail-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media (min-width:700px){.phone{max-width:430px;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line)}}
  </style>
</head>
<body>
<div class="phone">
  <header class="app-header">
    <div class="title"><h1>并行任务排程器</h1><span id="screenSubtitle">手机竖屏 · 任务列表</span></div>
    <div class="header-stat"><div class="mini"><b id="totalTime">--</b><small>完成</small></div><div class="mini"><b id="busyTime">--</b><small>占用人</small></div></div>
  </header>

  <main id="taskScreen" class="screen active">
    <div class="toolbar">
      <button class="secondary" id="addTask">新增任务</button>
      <div class="grow"></div>
      <button class="danger" id="clearAll">清空</button>
    </div>
    <div class="task-list" id="taskList"></div>
    <div class="hint">竖屏版把"时间"改成纵向向下流动。任务列表和时间轴拆成两个页面，用底部按钮切换，适合后续封装 APK。</div>
  </main>

  <main id="timelineScreen" class="screen">
    <div class="timeline-tools">
      <label>缩放</label><input id="scale" type="range" min="3" max="18" value="8" /><span id="scaleText" class="scale-text">8 px/分</span>
      <div class="grow"></div>
      <button id="autoSchedule" class="primary-btn">自动排序</button>
      <button id="fit" class="small-btn">适配</button>
    </div>
    <section class="timeline-wrap">
      <div class="timeline-scroll" id="timelineScroll">
        <div class="timeline-canvas" id="timelineCanvas"></div>
      </div>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-tab="task">📝 任务</button>
    <button class="tab" data-tab="timeline">📍 时间轴</button>
  </nav>
</div>

<div class="nonoptimal-banner" id="nonOptimalBanner">非最优规划</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card">
    <div class="detail-head">
      <h3>任务详情</h3>
      <button class="detail-done" id="detailClose">完成</button>
    </div>
    <div class="detail-body">
      <div class="detail-field" style="margin-bottom:10px">
        <label>任务名称</label>
        <input id="detailName">
      </div>
      <div class="seg" id="detailTypeSeg">
        <button type="button" data-type="continuous">持续</button>
        <button type="button" data-type="waiting">等待</button>
      </div>
      <div class="detail-fields" id="detailFields"></div>
    </div>
  </div>
</div>

<div class="modal" id="confirmModal">
  <div class="modal-card">
    <h3>确认清空全部任务？</h3>
    <p>这会删除当前任务、前置关系和手动调整记录。此操作不能撤销。</p>
    <div class="modal-actions"><button class="cancel" id="cancelClear">取消</button><button class="danger" id="confirmClear">确认清空</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const palette=[['#315efb','49,94,251'],['#10b981','16,185,129'],['#f59e0b','245,158,11'],['#8b5cf6','139,92,246'],['#06b6d4','6,182,212'],['#ef4444','239,68,68'],['#14b8a6','20,184,166']];
let idSeed=7;
let tasks=[
  {id:'t1',name:'烧水',type:'waiting',duration:0,startWork:1,wait:10,deps:[],lockedStart:null,lane:null},
  {id:'t2',name:'洗菜',type:'continuous',duration:5,startWork:0,wait:0,deps:[],lockedStart:null,lane:null},
  {id:'t3',name:'煮面',type:'continuous',duration:8,startWork:0,wait:0,deps:['t1','t2'],lockedStart:null,lane:null},
  {id:'t4',name:'泡木耳',type:'waiting',duration:0,startWork:1,wait:20,deps:[],lockedStart:null,lane:null},
  {id:'t5',name:'扔垃圾',type:'continuous',duration:6,startWork:0,wait:0,deps:[],lockedStart:null,lane:null},
  {id:'t6',name:'拌木耳',type:'continuous',duration:5,startWork:0,wait:0,deps:['t4'],lockedStart:null,lane:null}
];
let schedule=null;let pxPerMinute=8;let toastTimer=null;let activeScreen='task';let drag=null;let skipTaskRender=false;let openDepPanels=new Set();let detailTaskId=null;let optimalMakespan=null;let longPressTimer=null;let lastLaneWidth=80;
const $=id=>document.getElementById(id);
function uid(){return 't'+(idSeed++);}function n(v,f=0){const x=Number(v);return Number.isFinite(x)?Math.max(0,Math.round(x)):f;}function taskTotal(t){return t.type==='waiting'?Math.max(1,n(t.startWork)+n(t.wait)):Math.max(1,n(t.duration,1));}function activeDur(t){return t.type==='waiting'?n(t.startWork):Math.max(1,n(t.duration,1));}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}function dark(hex){const c=hex.replace('#','');return '#'+[0,2,4].map(i=>Math.max(0,Math.round(parseInt(c.slice(i,i+2),16)*.82)).toString(16).padStart(2,'0')).join('');}
function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1500);}function getTask(id){return tasks.find(t=>t.id===id);}function depNames(t){return (t.deps||[]).map(id=>getTask(id)?.name).filter(Boolean);}function intervalsOverlap(a1,a2,b1,b2){return Math.max(a1,b1)<Math.min(a2,b2);}function formatMin(m){if(m<60)return m+'′';const h=Math.floor(m/60),r=m%60;return r?h+'h'+r:h+'h';}function tickStep(maxEnd){const steps=[5,10,15,30,60,120,180,360];return steps.find(s=>s*pxPerMinute>=48)||360;}
function hasManualPlan(){return tasks.some(t=>t.lockedStart!==null&&t.lockedStart!==undefined);}
function updateNonOptimalBanner(){const el=$('nonOptimalBanner');if(!el||!schedule)return;const show=activeScreen==='timeline'&&optimalMakespan!==null&&hasManualPlan()&&schedule.makespan>optimalMakespan;el.classList.toggle('show',show);if(show)el.textContent='非最优规划：当前完成时间 '+schedule.makespan+'′，最短约 '+optimalMakespan+'′';}
function getLaneMetrics(laneCount){const scroll=$('timelineScroll');const available=Math.max(260,(scroll&&scroll.clientWidth)||window.innerWidth||360);const axis=44;const minLane=58;const laneWidth=Math.max(minLane,Math.floor((available-axis)/Math.max(1,laneCount)));const blockWidth=Math.max(44,Math.min(58,laneWidth-18));lastLaneWidth=laneWidth;return{axis,laneWidth,blockWidth};}

/* ---- 详情浮窗 ---- */
function showDetailPanel(taskId){
  detailTaskId=taskId;
  const t=getTask(taskId);
  if(!t)return;
  $('detailName').value=t.name;
  $('detailTypeSeg').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.type===t.type));
  renderDetailFields(t);
  $('detailOverlay').classList.add('show');
}
function hideDetailPanel(){detailTaskId=null;$('detailOverlay').classList.remove('show');}
function renderDetailFields(t){
  const box=$('detailFields');
  const isW=t.type==='waiting';
  if(isW){
    box.innerHTML=`<div class="detail-field"><label>启动/分钟</label><input type="number" id="detailStartWork" value="${t.startWork}"></div><div class="detail-field"><label>等待/分钟</label><input type="number" id="detailWait" value="${t.wait}"></div>`;
  }else{
    box.innerHTML=`<div class="detail-field"><label>持续/分钟</label><input type="number" id="detailDuration" value="${t.duration}"></div>`;
  }
  attachDetailFieldListeners();
}
function attachDetailFieldListeners(){
  const t=getTask(detailTaskId);if(!t)return;
  const durInput=document.getElementById('detailDuration');
  const swInput=document.getElementById('detailStartWork');
  const waitInput=document.getElementById('detailWait');
  if(durInput) durInput.oninput=e=>{t.duration=n(e.target.value);t.lockedStart=null;skipTaskRender=true;scheduleTasks(false);skipTaskRender=false;};
  if(swInput) swInput.oninput=e=>{t.startWork=n(e.target.value);t.lockedStart=null;skipTaskRender=true;scheduleTasks(false);skipTaskRender=false;};
  if(waitInput) waitInput.oninput=e=>{t.wait=n(e.target.value);t.lockedStart=null;skipTaskRender=true;scheduleTasks(false);skipTaskRender=false;};
}
$('detailClose').onclick=hideDetailPanel;
$('detailOverlay').onclick=e=>{if(e.target.id==='detailOverlay')hideDetailPanel()};
$('detailName').oninput=e=>{const t=getTask(detailTaskId);if(t){t.name=e.target.value;t.lockedStart=null;skipTaskRender=true;scheduleTasks(false);skipTaskRender=false;}};
$('detailTypeSeg').onclick=e=>{
  const btn=e.target.closest('button[data-type]');if(!btn)return;
  const t=getTask(detailTaskId);if(!t)return;
  t.type=btn.dataset.type;
  if(t.type==='waiting'){t.startWork=Math.max(1,t.startWork||1);t.wait=Math.max(1,t.wait||10);t.duration=0;}
  else{t.duration=Math.max(1,t.duration||t.startWork+t.wait||5);t.startWork=0;t.wait=0;}
  t.lockedStart=null;
  $('detailTypeSeg').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.type===t.type));
  renderDetailFields(t);
  skipTaskRender=true;scheduleTasks(false);skipTaskRender=false;
};

/* ---- 页面切换 ---- */
function setTab(tab){
  activeScreen=tab;
  hideDetailPanel();
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  $('taskScreen').classList.toggle('active',tab==='task');
  $('timelineScreen').classList.toggle('active',tab==='timeline');
  $('screenSubtitle').textContent=tab==='task'?'手机竖屏 · 任务列表':'手机竖屏 · 纵向时间轴';
  if(tab==='timeline')renderTimeline();
  if(tab==='task')renderTasks();
  updateNonOptimalBanner();
}
function showConfirm(){ $('confirmModal').classList.add('show'); }function hideConfirm(){ $('confirmModal').classList.remove('show'); }

/* ---- 任务列表 ---- */
function renderTasks(){
  const box=$('taskList');
  box.innerHTML=tasks.map(t=>{
    const isW=t.type==='waiting';
    const depNamesArr=t.deps.map(id=>getTask(id)?.name).filter(Boolean);
    const depSummaryText=depNamesArr.length?depNamesArr.join('、'):'无';
    const depOptions=tasks.filter(o=>o.id!==t.id).map(o=>`<label class="dep-chip"><input type="checkbox" data-task="${t.id}" value="${o.id}" ${t.deps.includes(o.id)?'checked':''}>${esc(o.name)}</label>`).join('')||'<div class="dep-empty">暂无可选前置任务</div>';
    return `<article class="task-card" data-id="${t.id}">
  <div class="task-head"><input data-field="name" value="${esc(t.name)}"><button class="delete" data-del="${t.id}">×</button></div>
  <div class="seg"><button type="button" data-type="continuous" class="${!isW?'active':''}">持续</button><button type="button" data-type="waiting" class="${isW?'active':''}">等待</button></div>
  <div class="fields">
    <div class="field ${isW?'hidden':''}"><label>持续/分钟</label><input type="number" data-field="duration" value="${t.duration}"></div>
    <div class="field ${!isW?'hidden':''}"><label>启动/分钟</label><input type="number" data-field="startWork" value="${t.startWork}"></div>
    <div class="field ${!isW?'hidden':''}"><label>等待/分钟</label><input type="number" data-field="wait" value="${t.wait}"></div>
  </div>
  <div class="deps">
    <div class="deps-head"><label>前置任务</label><button class="dep-toggle" data-toggle-dep="${t.id}">编辑</button></div>
    <div class="dep-summary">${esc(depSummaryText)}</div>
    <div class="dep-grid hidden" data-dep-panel="${t.id}">${depOptions}</div>
  </div>
</article>`}).join('');
  openDepPanels.forEach(id=>{
    const panel=box.querySelector(`[data-dep-panel="${id}"]`);
    const btn=box.querySelector(`[data-toggle-dep="${id}"]`);
    if(panel)panel.classList.remove('hidden');
    if(btn)btn.textContent='收起';
  });
}

/* ---- 调度引擎 ---- */
function renderStats(){if(!schedule)return;$('totalTime').textContent=schedule.makespan+'′';$('busyTime').textContent=schedule.busy+'′';updateNonOptimalBanner();}
function buildOps(){const ops=[];const final=new Map();const first=new Map();function add(op){ops.push({deps:[],earliest:0,...op});return op.id;}tasks.forEach(t=>{if(t.type==='continuous'){const id=add({id:t.id+':work',taskId:t.id,kind:'work',human:true,duration:Math.max(1,n(t.duration,1))});first.set(t.id,id);final.set(t.id,id);}else{const s=add({id:t.id+':start',taskId:t.id,kind:'start',human:true,duration:n(t.startWork)});const w=add({id:t.id+':wait',taskId:t.id,kind:'wait',human:false,duration:n(t.wait),deps:[s]});first.set(t.id,s);final.set(t.id,w);}});tasks.forEach(t=>{const f=ops.find(o=>o.id===first.get(t.id));(t.deps||[]).forEach(d=>{const depFinal=final.get(d);if(f&&depFinal)f.deps.push(depFinal);});if(f&&t.lockedStart!==null&&t.lockedStart!==undefined)f.earliest=Math.max(f.earliest,n(t.lockedStart));});return{ops,final};}
function priority(op){const t=getTask(op.taskId);const children=tasks.filter(x=>(x.deps||[]).includes(t.id)).length;if(op.kind==='start')return 10000+n(t.wait)*100+children*160;if(op.kind==='work')return children*300-n(t.duration);return 0;}
function scheduleTasks(clearLocks=false){if(clearLocks)tasks.forEach(t=>{t.lockedStart=null;t.lane=null});tasks.forEach(t=>{t.duration=n(t.duration);t.startWork=n(t.startWork);t.wait=n(t.wait);});const {ops,final}=buildOps();const opMap=new Map(ops.map(o=>[o.id,o]));const done=new Map();const left=new Set(ops.map(o=>o.id));let human=0,guard=0;function depsDone(op){return op.deps.every(id=>done.has(id));}function ready(op){return Math.max(op.earliest||0,op.deps.reduce((m,id)=>Math.max(m,done.get(id)?.end??0),0));}function put(op,start){done.set(op.id,{...op,start,end:start+Math.max(0,op.duration)});left.delete(op.id);}function flush(){let changed=true;while(changed){changed=false;for(const id of Array.from(left)){const op=opMap.get(id);if(!op.human&&depsDone(op)){put(op,ready(op));changed=true;}}}}while(left.size&&guard++<500){flush();const humanOps=Array.from(left).map(id=>opMap.get(id)).filter(o=>o.human&&depsDone(o));if(!humanOps.length)break;const list=humanOps.map(op=>({op,rt:ready(op),p:priority(op)}));const min=Math.min(...list.map(x=>x.rt));if(human<min)human=min;const pool=list.filter(x=>x.rt<=human+.001);(pool.length?pool:list).sort((a,b)=>b.p-a.p||a.rt-b.rt);const chosen=(pool.length?pool:list)[0].op;const start=Math.max(human,ready(chosen));put(chosen,start);human=start+Math.max(0,chosen.duration);}flush();const items=tasks.map((t,i)=>{const segs=Array.from(done.values()).filter(o=>o.taskId===t.id).sort((a,b)=>a.start-b.start);const start=segs.length?Math.min(...segs.map(s=>s.start)):0;const end=segs.length?Math.max(...segs.map(s=>s.end)):start+taskTotal(t);return{task:t,color:palette[i%palette.length],segments:segs,start,end,lane:0};});assignLanes(items);const makespan=items.reduce((m,x)=>Math.max(m,x.end),0);const busy=Array.from(done.values()).filter(o=>o.human).reduce((s,o)=>s+o.end-o.start,0);schedule={items,makespan,busy};if(clearLocks||!hasManualPlan()||optimalMakespan===null)optimalMakespan=makespan;renderAll();updateNonOptimalBanner();}
function assignLanes(items){const parent=new Map(tasks.map(t=>[t.id,t.id]));function find(id){if(parent.get(id)!==id)parent.set(id,find(parent.get(id)));return parent.get(id);}function union(a,b){const ra=find(a),rb=find(b);if(ra!==rb)parent.set(ra,rb);}tasks.forEach(t=>(t.deps||[]).forEach(d=>union(t.id,d)));const groups=new Map();tasks.forEach(t=>{const r=find(t.id);if(!groups.has(r))groups.set(r,[]);groups.get(r).push(t.id);});const idMap=new Map(items.map(i=>[i.task.id,i]));const depGroups=[];const occ=[];let next=0;for(const g of Array.from(groups.values()).filter(g=>g.length>1)){const groupItems=g.map(id=>idMap.get(id)).filter(Boolean).sort((a,b)=>a.start-b.start);const laneIntervals=[];for(const item of groupItems){let off=0;while(true){const ints=laneIntervals[off]||[];if(!ints.some(iv=>intervalsOverlap(item.start,item.end,iv.start,iv.end))){(laneIntervals[off]||(laneIntervals[off]=[])).push({start:item.start,end:item.end});item.lane=next+off;break;}off++;}}const minLane=next,maxLane=next+laneIntervals.length-1,start=Math.min(...groupItems.map(i=>i.start)),end=Math.max(...groupItems.map(i=>i.end));for(let l=minLane;l<=maxLane;l++){(occ[l]||(occ[l]=[])).push({start,end,box:true});}depGroups.push({ids:g,start,end,minLane,maxLane});next+=laneIntervals.length;}for(const item of items.filter(i=>i.lane===0&&!depGroups.some(g=>g.ids.includes(i.task.id)))){let lane=Number.isInteger(item.task.lane)?item.task.lane:0;while((occ[lane]||[]).some(iv=>intervalsOverlap(item.start,item.end,iv.start,iv.end)))lane++;item.lane=lane;(occ[lane]||(occ[lane]=[])).push({start:item.start,end:item.end});}window.depGroups=depGroups;}

function renderAll(){if(!skipTaskRender)renderTasks();renderStats();renderTimeline();}

/* ---- 时间轴渲染 ---- */
function renderTimeline(){
  if(!schedule)return;
  const canvas=$('timelineCanvas');
  const maxEnd=Math.max(40,Math.ceil((schedule.makespan+8)/5)*5);
  const laneCount=Math.max(1,Math.max(0,...schedule.items.map(i=>i.lane))+1);
  const metrics=getLaneMetrics(laneCount);
  const laneWidth=metrics.laneWidth;
  const width=metrics.axis+laneCount*laneWidth;
  const height=38+maxEnd*pxPerMinute+40;
  canvas.style.width=width+'px';
  canvas.style.height=height+'px';
  canvas.innerHTML=`<div class="lane-head" style="width:${width}px"><div class="axis-head">时间</div></div>`;
  for(let l=0;l<laneCount;l++){
    canvas.innerHTML+=`<div class="lane-bg" style="left:${metrics.axis+l*laneWidth}px;width:${laneWidth}px"></div><div class="lane-label" style="left:${metrics.axis+l*laneWidth}px;width:${laneWidth}px">行 ${l+1}</div>`;
  }
  const step=tickStep(maxEnd);
  for(let m=0;m<=maxEnd;m+=step){
    const y=38+m*pxPerMinute;
    const major=m%(step*2)===0;
    canvas.innerHTML+=`<div class="time-tick ${major?'major':''}" style="top:${y}px"><div class="tick-label">${formatMin(m)}</div></div>`;
  }
  for(const g of window.depGroups||[]){
    const left=metrics.axis+g.minLane*laneWidth+4,top=38+g.start*pxPerMinute-6,w=(g.maxLane-g.minLane+1)*laneWidth-8,h=(g.end-g.start)*pxPerMinute+12;
    canvas.innerHTML+=`<div class="dep-box" style="left:${left}px;top:${Math.max(38,top)}px;width:${w}px;height:${Math.max(28,h)}px"></div>`;
  }
  for(const item of schedule.items)renderBlock(canvas,item);
}

function renderBlock(canvas,item){
  const {task,color,start,end,lane}=item;
  const metrics=getLaneMetrics(Math.max(1,Math.max(0,...schedule.items.map(i=>i.lane))+1));
  const laneWidth=metrics.laneWidth;
  const blockWidth=metrics.blockWidth;
  const left=metrics.axis+lane*laneWidth+(laneWidth-blockWidth)/2;
  const top=38+start*pxPerMinute;
  const w=blockWidth;
  const h=Math.max(28,(end-start)*pxPerMinute);
  const div=document.createElement('div');
  div.className='task-block '+(task.type==='waiting'?'waiting':'continuous');
  div.dataset.id=task.id;
  div.style.left=left+'px';
  div.style.top=top+'px';
  div.style.width=w+'px';
  div.style.height=h+'px';
  div.style.setProperty('--task-color',color[0]);
  div.style.setProperty('--task-dark',dark(color[0]));
  div.style.setProperty('--task-rgb',color[1]);
  if(task.type==='waiting'){
    const p=Math.max(0,Math.min(100,n(task.startWork)/taskTotal(task)*100));
    div.innerHTML+=`<div class="wait-solid" style="height:${p}%"></div><div class="wait-gradient" style="top:${p}%;height:${100-p}%"></div><div class="start-handle" style="top:${p}%"></div>`;
  }
  div.innerHTML+=`<div class="block-content"><div class="block-title">${esc(task.name)}</div></div><div class="resize-handle"></div>`;
  canvas.appendChild(div);
  attachBlock(div,item);
}

function updateWaitVisual(block,startWork,total){const p=Math.max(0,Math.min(100,startWork/Math.max(1,total)*100));const solid=block.querySelector('.wait-solid'),grad=block.querySelector('.wait-gradient'),handle=block.querySelector('.start-handle');if(solid)solid.style.height=p+'%';if(grad){grad.style.top=p+'%';grad.style.height=(100-p)+'%';}if(handle)handle.style.top=p+'%';}
function inForeignBox(taskId,lane,start,end){return (window.depGroups||[]).some(g=>!g.ids.includes(taskId)&&lane>=g.minLane&&lane<=g.maxLane&&intervalsOverlap(start,end,g.start,g.end));}

function attachBlock(block,item){
  block.addEventListener('pointerdown',e=>{
    const task=item.task;
    const mode=e.target.classList.contains('resize-handle')?'resize':e.target.classList.contains('start-handle')?'start':'drag';
    clearTimeout(longPressTimer);
    drag={mode,id:task.id,sx:e.clientX,sy:e.clientY,top:parseFloat(block.style.top),left:parseFloat(block.style.left),height:parseFloat(block.style.height),lane:item.lane,start:item.start,locked:task.lockedStart,taskLane:task.lane,startWork:n(task.startWork),wait:n(task.wait),total:taskTotal(task),block,longOpened:false};
    block.classList.add('dragging');block.setPointerCapture(e.pointerId);e.preventDefault();
    if(mode==='drag'){
      longPressTimer=setTimeout(()=>{
        if(!drag||drag.id!==task.id||drag.mode!=='drag'||drag.longOpened)return;
        drag.longOpened=true;
        block.classList.remove('dragging');
        try{block.releasePointerCapture(e.pointerId)}catch{}
        showDetailPanel(task.id);
      },520);
    }
  });
  block.addEventListener('pointermove',e=>{
    if(!drag||drag.id!==item.task.id)return;
    const dy=e.clientY-drag.sy,dx=e.clientX-drag.sx;
    if(Math.abs(dx)+Math.abs(dy)>8)clearTimeout(longPressTimer);
    if(drag.longOpened)return;
    if(drag.mode==='drag'){block.style.top=Math.max(38,drag.top+dy)+'px';block.style.left=Math.max(44,drag.left+dx)+'px';}
    else if(drag.mode==='resize'){const total=Math.max(item.task.type==='waiting'?n(item.task.startWork):1,Math.round((drag.height+dy)/pxPerMinute));block.style.height=Math.max(28,total*pxPerMinute)+'px';if(item.task.type==='waiting')updateWaitVisual(block,n(item.task.startWork),total);}
    else if(drag.mode==='start'){const sw=Math.max(0,Math.round((drag.startWork*pxPerMinute+dy)/pxPerMinute));const total=sw+drag.wait;block.style.height=Math.max(28,total*pxPerMinute)+'px';updateWaitVisual(block,sw,total);}
  });
  block.addEventListener('pointerup',e=>finishDrag(e,item));
  block.addEventListener('pointercancel',e=>finishDrag(e,item));
}

function finishDrag(e,item){
  if(!drag||drag.id!==item.task.id)return;
  clearTimeout(longPressTimer);
  const task=item.task,block=drag.block;
  block.classList.remove('dragging');
  try{block.releasePointerCapture(e.pointerId)}catch{}
  if(drag.longOpened){drag=null;return;}
  /* 轻触判定：位移 < 8px 视为点击 */
  const dist=Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy);
  if(dist<8){drag=null;showDetailPanel(task.id);return;}
  if(drag.mode==='drag'){
    const newStart=Math.max(0,Math.round((parseFloat(block.style.top)-38)/pxPerMinute));
    const laneWidth=lastLaneWidth||80;
    const metrics=getLaneMetrics(Math.max(1,Math.max(0,...schedule.items.map(i=>i.lane))+1));
    let newLane=Math.max(0,Math.round((parseFloat(block.style.left)-metrics.axis-(laneWidth-metrics.blockWidth)/2)/laneWidth));
    const isGroup=(window.depGroups||[]).some(g=>g.ids.includes(task.id));
    if(isGroup)newLane=item.lane;
    const len=item.end-item.start;
    if(inForeignBox(task.id,newLane,newStart,newStart+len)){task.lockedStart=drag.locked;task.lane=drag.taskLane;toast('不属于该逻辑组，不能拖进虚线框');}
    else{task.lockedStart=newStart;if(!isGroup)task.lane=newLane;toast('已调整开始时间');}
  }else if(drag.mode==='resize'){
    const total=Math.max(1,Math.round(parseFloat(block.style.height)/pxPerMinute));
    if(task.type==='continuous')task.duration=total;else task.wait=Math.max(0,total-n(task.startWork));
    toast('已调整长度');
  }else if(drag.mode==='start'){
    const total=Math.max(1,Math.round(parseFloat(block.style.height)/pxPerMinute));
    task.startWork=Math.max(0,total-drag.wait);task.wait=drag.wait;
    toast('已调整启动部分');
  }
  drag=null;scheduleTasks(false);
}

/* ---- 任务列表交互 ---- */
$('taskList').addEventListener('input',e=>{const card=e.target.closest('.task-card');if(!card)return;const t=getTask(card.dataset.id);if(!t)return;const f=e.target.dataset.field;if(!f)return;if(['duration','startWork','wait'].includes(f))t[f]=n(e.target.value);else t[f]=e.target.value;t.lockedStart=null;skipTaskRender=true;scheduleTasks(false);skipTaskRender=false;});
$('taskList').addEventListener('click',e=>{
  const card=e.target.closest('.task-card');
  if(!card)return;
  const t=getTask(card.dataset.id);
  if(e.target.dataset.toggleDep){
    const id=e.target.dataset.toggleDep;
    const panel=card.querySelector(`[data-dep-panel="${id}"]`);
    if(panel){
      panel.classList.toggle('hidden');
      if(panel.classList.contains('hidden')){openDepPanels.delete(id);e.target.textContent='编辑';}
      else{openDepPanels.add(id);e.target.textContent='收起';}
    }
    return;
  }
  if(e.target.dataset.type){
    t.type=e.target.dataset.type;
    if(t.type==='waiting'){t.startWork=Math.max(1,t.startWork||1);t.wait=Math.max(1,t.wait||10);t.duration=0}
    else{t.duration=Math.max(1,t.duration||t.startWork+t.wait||5);t.startWork=0;t.wait=0}
    t.lockedStart=null;scheduleTasks(false);
  }
  if(e.target.dataset.del){
    openDepPanels.delete(e.target.dataset.del);
    tasks=tasks.filter(x=>x.id!==e.target.dataset.del);
    tasks.forEach(x=>x.deps=(x.deps||[]).filter(id=>id!==e.target.dataset.del));
    scheduleTasks(false);
  }
});
$('taskList').addEventListener('change',e=>{
  if(e.target.matches('.dep-chip input')){
    const t=getTask(e.target.dataset.task);
    const ids=Array.from(document.querySelectorAll(`.dep-chip input[data-task="${t.id}"]:checked`)).map(x=>x.value);
    t.deps=ids;t.lockedStart=null;
    const card=e.target.closest('.task-card');
    const summary=card.querySelector('.dep-summary');
    if(summary){const names=ids.map(id=>getTask(id)?.name).filter(Boolean);summary.textContent=names.length?names.join('、'):'无';}
    skipTaskRender=true;scheduleTasks(false);skipTaskRender=false;
  }
});

/* ---- 全局按钮 ---- */
$('addTask').onclick=()=>{tasks.push({id:uid(),name:'新任务',type:'continuous',duration:5,startWork:0,wait:0,deps:[],lockedStart:null,lane:null});scheduleTasks(false);toast('已新增任务')};
$('autoSchedule').onclick=()=>{hideDetailPanel();openDepPanels.clear();scheduleTasks(true);toast('已自动排序')};
$('clearAll').onclick=showConfirm;
$('cancelClear').onclick=hideConfirm;
$('confirmClear').onclick=()=>{tasks=[];openDepPanels.clear();hideDetailPanel();hideConfirm();optimalMakespan=null;scheduleTasks(true);toast('已清空')};
$('confirmModal').onclick=e=>{if(e.target.id==='confirmModal')hideConfirm()};
$('scale').oninput=e=>{pxPerMinute=Number(e.target.value);document.documentElement.style.setProperty('--ppm',pxPerMinute+'px');$('scaleText').textContent=pxPerMinute+' px/分';renderTimeline();};
$('fit').onclick=()=>{if(!schedule)return;const view=$('timelineScroll').clientHeight-70;const max=Math.max(40,schedule.makespan+8);pxPerMinute=Math.max(3,Math.min(18,Math.floor(view/max)));$('scale').value=pxPerMinute;$('scaleText').textContent=pxPerMinute+' px/分';renderTimeline();};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
window.addEventListener('resize',()=>{renderTimeline();updateNonOptimalBanner();});
scheduleTasks(true);
</script>
