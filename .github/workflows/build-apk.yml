name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Verify web entry
        run: test -f www/index.html

      - name: Add Android project
        run: npx cap add android

      - name: Generate Android icon and splash assets
        run: npx capacitor-assets generate --android

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: time-master-v3.0.1-icon-fixed-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
